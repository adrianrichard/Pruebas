<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - Horarios de Misa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { color: #4a5568; font-size: 1.8em; }
        .btn-volver {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }
        .panel.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-danger { background: #f56565; }
        .btn-success { background: #48bb78; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background: #f7fafc; font-weight: 600; }
        .btn-editar { background: #48bb78; padding: 5px 10px; font-size: 0.9em; }
        .btn-eliminar { background: #f56565; padding: 5px 10px; font-size: 0.9em; }
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            min-width: 300px;
        }
        .alert-success { background: #c6f6d5; color: #22543d; }
        .alert-error { background: #fed7d7; color: #742a2a; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
        }
        .loading { text-align: center; padding: 40px; color: #718096; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-number { font-size: 2em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Panel de Administración</h1>
            <a href="/" class="btn-volver">← Ver Horarios</a>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="mostrarPanel('parroquias')">⛪ Parroquias</button>
            <button class="tab" onclick="mostrarPanel('horarios')">🕰️ Horarios</button>
            <button class="tab" onclick="mostrarPanel('importar')">📤 Importar/Exportar</button>
        </div>

        <div id="alert" class="alert"></div>

        <!-- Panel Parroquias -->
        <div id="panel-parroquias" class="panel active">
            <div class="stats" id="statsParroquias"></div>
            
            <h2>➕ Agregar Parroquia</h2>
            <form id="formParroquia">
                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" id="parroquiaNombre" required>
                </div>
                <div class="form-group">
                    <label>Dirección:</label>
                    <input type="text" id="parroquiaDireccion">
                </div>
                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" id="parroquiaTelefono">
                </div>
                <button type="submit">➕ Agregar Parroquia</button>
            </form>

            <h2 style="margin-top: 30px;">📋 Lista de Parroquias</h2>
            <div id="listaParroquias"><div class="loading">Cargando...</div></div>
        </div>

        <!-- Panel Horarios -->
        <div id="panel-horarios" class="panel">
            <div class="stats" id="statsHorarios"></div>
            
            <h2>➕ Agregar Horario</h2>
            <form id="formHorario">
                <div class="form-group">
                    <label>Parroquia:</label>
                    <select id="horarioParroquia" required></select>
                </div>
                <div class="form-group">
                    <label>Día:</label>
                    <select id="horarioDia" required>
                        <option value="0">Domingo</option>
                        <option value="1">Lunes</option>
                        <option value="2">Martes</option>
                        <option value="3">Miércoles</option>
                        <option value="4">Jueves</option>
                        <option value="5">Viernes</option>
                        <option value="6">Sábado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Hora:</label>
                    <input type="time" id="horarioHora" required>
                </div>
                <button type="submit">➕ Agregar Horario</button>
            </form>

            <h2 style="margin-top: 30px;">📋 Lista de Horarios</h2>
            <div id="listaHorarios"><div class="loading">Cargando...</div></div>
        </div>

        <!-- Panel Importar/Exportar -->
        <div id="panel-importar" class="panel">
            <h2>📥 Exportar Datos</h2>
            <button onclick="exportarDatos()" class="btn-success">💾 Descargar db.json</button>
            
            <h2 style="margin-top: 30px;">📤 Importar Datos</h2>
            <form id="formImportar">
                <div class="form-group">
                    <label>Archivo JSON:</label>
                    <input type="file" id="archivoJSON" accept=".json">
                </div>
                <button type="submit">📤 Importar</button>
            </form>
        </div>
    </div>

    <!-- Modal Editar -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>✏️ Editar Parroquia</h2>
            <form id="formEditar">
                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" id="editNombre" required>
                </div>
                <div class="form-group">
                    <label>Dirección:</label>
                    <input type="text" id="editDireccion">
                </div>
                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" id="editTelefono">
                </div>
                <button type="submit">💾 Guardar</button>
                <button type="button" onclick="cerrarModal()" class="btn-danger">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        let parroquiaEditandoId = null;

        function mostrarAlerta(mensaje, tipo) {
            const alert = document.getElementById('alert');
            alert.textContent = mensaje;
            alert.className = `alert alert-${tipo}`;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 3000);
        }

        function mostrarPanel(panel) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`panel-${panel}`).classList.add('active');
            event.target.classList.add('active');
            
            if (panel === 'parroquias') cargarParroquias();
            if (panel === 'horarios') cargarHorarios();
        }

        async function cargarParroquias() {
            try {
                const response = await fetch('/api/parroquias');
                const parroquias = await response.json();
                
                // Actualizar estadísticas
                document.getElementById('statsParroquias').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${parroquias.length}</div><div>Total Parroquias</div></div>
                `;
                
                // Mostrar lista
                const html = `
                    <table>
                        <thead><tr><th>ID</th><th>Nombre</th><th>Dirección</th><th>Teléfono</th><th>Acciones</th></tr></thead>
                        <tbody>
                            ${parroquias.map(p => `
                                <tr>
                                    <td>${p.id}</td>
                                    <td><strong>${p.nombre}</strong></td>
                                    <td>${p.direccion || '-'}</td>
                                    <td>${p.telefono || '-'}</td>
                                    <td>
                                        <button class="btn-editar" onclick="editarParroquia(${p.id})">✏️ Editar</button>
                                        <button class="btn-eliminar" onclick="eliminarParroquia(${p.id})">🗑️ Eliminar</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('listaParroquias').innerHTML = html;
                
                // Actualizar select de horarios
                const select = document.getElementById('horarioParroquia');
                select.innerHTML = '<option value="">Seleccionar parroquia</option>' + 
                    parroquias.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
                    
            } catch (error) {
                document.getElementById('listaParroquias').innerHTML = `<div class="loading">❌ Error: ${error.message}</div>`;
            }
        }

        async function cargarHorarios() {
            try {
                const response = await fetch('/api/admin/datos');
                const data = await response.json();
                
                // Actualizar estadísticas
                document.getElementById('statsHorarios').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${data.horarios?.length || 0}</div><div>Total Horarios</div></div>
                `;
                
                if (!data.horarios || data.horarios.length === 0) {
                    document.getElementById('listaHorarios').innerHTML = '<div class="loading">📭 No hay horarios</div>';
                    return;
                }
                
                const dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                const html = `
                    <table>
                        <thead><tr><th>#</th><th>Parroquia</th><th>Día</th><th>Hora</th><th>Acciones</th></tr></thead>
                        <tbody>
                            ${data.horarios.map((h, idx) => {
                                const parroquia = data.parroquias.find(p => p.id === h.parroquia_id);
                                return `
                                    <tr>
                                        <td>${idx + 1}</td>
                                        <td>${parroquia ? parroquia.nombre : 'Desconocida'}</td>
                                        <td>${dias[h.dia_semana]}</td>
                                        <td>${h.hora}</td>
                                        <td><button class="btn-eliminar" onclick="eliminarHorario(${idx})">🗑️ Eliminar</button></td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('listaHorarios').innerHTML = html;
            } catch (error) {
                document.getElementById('listaHorarios').innerHTML = `<div class="loading">❌ Error: ${error.message}</div>`;
            }
        }

        document.getElementById('formParroquia').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nuevaParroquia = {
                nombre: document.getElementById('parroquiaNombre').value,
                direccion: document.getElementById('parroquiaDireccion').value,
                telefono: document.getElementById('parroquiaTelefono').value
            };
            
            try {
                const response = await fetch('/api/admin/parroquias', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevaParroquia)
                });
                
                if (response.ok) {
                    mostrarAlerta('✅ Parroquia agregada', 'success');
                    document.getElementById('formParroquia').reset();
                    cargarParroquias();
                }
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error');
            }
        });

        document.getElementById('formHorario').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nuevoHorario = {
                parroquia_id: parseInt(document.getElementById('horarioParroquia').value),
                dia_semana: parseInt(document.getElementById('horarioDia').value),
                hora: document.getElementById('horarioHora').value
            };
            
            if (!nuevoHorario.parroquia_id) {
                mostrarAlerta('❌ Selecciona una parroquia', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/horarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoHorario)
                });
                
                if (response.ok) {
                    mostrarAlerta('✅ Horario agregado', 'success');
                    document.getElementById('formHorario').reset();
                    cargarHorarios();
                }
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error');
            }
        });

        async function editarParroquia(id) {
            try {
                const response = await fetch(`/api/parroquia/${id}`);
                const parroquia = await response.json();
                
                parroquiaEditandoId = id;
                document.getElementById('editNombre').value = parroquia.nombre;
                document.getElementById('editDireccion').value = parroquia.direccion || '';
                document.getElementById('editTelefono').value = parroquia.telefono || '';
                document.getElementById('modal').style.display = 'block';
            } catch (error) {
                mostrarAlerta('Error al cargar parroquia', 'error');
            }
        }

        document.getElementById('formEditar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const parroquiaActualizada = {
                nombre: document.getElementById('editNombre').value,
                direccion: document.getElementById('editDireccion').value,
                telefono: document.getElementById('editTelefono').value
            };
            
            try {
                const response = await fetch(`/api/admin/parroquias/${parroquiaEditandoId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(parroquiaActualizada)
                });
                
                if (response.ok) {
                    mostrarAlerta('✅ Parroquia actualizada', 'success');
                    cerrarModal();
                    cargarParroquias();
                }
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error');
            }
        });

        async function eliminarParroquia(id) {
            if (!confirm('¿Eliminar esta parroquia? También se eliminarán sus horarios.')) return;
            
            try {
                const response = await fetch(`/api/admin/parroquias/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    mostrarAlerta('✅ Parroquia eliminada', 'success');
                    cargarParroquias();
                    cargarHorarios();
                }
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error');
            }
        }

        async function eliminarHorario(index) {
            if (!confirm('¿Eliminar este horario?')) return;
            
            try {
                const response = await fetch(`/api/admin/horarios/${index}`, { method: 'DELETE' });
                if (response.ok) {
                    mostrarAlerta('✅ Horario eliminado', 'success');
                    cargarHorarios();
                }
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error');
            }
        }

        async function exportarDatos() {
            try {
                const response = await fetch('/api/admin/datos');
                const data = await response.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `db_backup_${new Date().toISOString().slice(0,19)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                mostrarAlerta('✅ Datos exportados', 'success');
            } catch (error) {
                mostrarAlerta('❌ Error al exportar', 'error');
            }
        }

        document.getElementById('formImportar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('archivoJSON').files[0];
            if (!file) {
                mostrarAlerta('❌ Selecciona un archivo', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const datos = JSON.parse(event.target.result);
                    const response = await fetch('/api/admin/guardar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(datos)
                    });
                    
                    if (response.ok) {
                        mostrarAlerta('✅ Datos importados', 'success');
                        cargarParroquias();
                        cargarHorarios();
                    }
                } catch (error) {
                    mostrarAlerta('❌ Archivo inválido', 'error');
                }
            };
            reader.readAsText(file);
        });

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
            parroquiaEditandoId = null;
        }

        // Inicializar
        cargarParroquias();
    </script>
</body>
</html>
