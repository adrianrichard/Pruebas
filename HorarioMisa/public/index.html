<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios de Misa | Parroquias hoy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header h1 {
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .fecha {
            color: #718096;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .dia-semana {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .btn-admin {
            background: #48bb78;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
            margin-top: 15px;
        }

        .btn-admin:hover {
            background: #38a169;
        }

        .horarios-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hora-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .hora-card:hover {
            transform: translateY(-5px);
        }

        .hora-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .hora-titulo {
            font-size: 1.8em;
            font-weight: bold;
        }

        .cantidad {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .parroquias-lista {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .parroquia-item {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .parroquia-item:hover {
            background: #edf2f7;
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .parroquia-item:before {
            content: "⛪";
        }

        .loading {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            font-size: 1.2em;
            color: #718096;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 0.9em;
        }

        /* Modal mejorado */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 20px;
            width: 90%;
            max-width: 650px;
            position: relative;
            animation: slideDown 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 25px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5em;
        }

        .close {
            color: white;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            line-height: 1;
        }

        .close:hover {
            transform: scale(1.1);
        }

        .modal-body {
            padding: 25px;
            max-height: 550px;
            overflow-y: auto;
        }

        .info-parroquia {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-parroquia p {
            margin: 8px 0;
            color: #4a5568;
        }

        .info-parroquia strong {
            color: #2d3748;
        }

        .horarios-semana {
            margin-top: 20px;
        }

        .horarios-semana h3 {
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dia-horario {
            margin-bottom: 15px;
            border-left: 3px solid #667eea;
            padding-left: 15px;
        }

        .dia-nombre {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 8px;
        }

        .horas-lista {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .hora-badge {
            background: #edf2f7;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #2d3748;
            font-family: monospace;
            font-weight: 500;
        }

        .no-horarios {
            text-align: center;
            padding: 30px;
            color: #a0aec0;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .hora-titulo {
                font-size: 1.3em;
            }
            
            .parroquia-item {
                font-size: 0.9em;
                padding: 8px 15px;
            }

            .modal-content {
                margin: 10% auto;
                width: 95%;
            }

            .modal-body {
                padding: 20px;
                max-height: 450px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✝️ Horarios de Misa</h1>
            <div class="fecha">
                <div class="dia-semana" id="diaSemana">Cargando...</div>
                <div id="fechaCompleta"></div>
            </div>
            <a href="./admin.html" class="btn-admin">⚙️ Panel de Administración</a>
        </div>

        <div id="horariosContainer" class="horarios-grid">
            <div class="loading">🕯️ Cargando horarios...</div>
        </div>

        <div class="footer">
            <p>📅 Horarios actualizados periódicamente | Solo se muestran horarios con misas</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⛪ Detalles de la Parroquia</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        async function cargarHorarios() {
            try {
                const response = await fetch(`${API_URL}/horarios`);
                if (!response.ok) throw new Error('Error al cargar horarios');
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error:', error);
                throw error;
            }
        }

        async function obtenerParroquiaConHorarios(id) {
            try {
                const response = await fetch(`${API_URL}/parroquia/${id}`);
                if (!response.ok) throw new Error('Error al obtener parroquia');
                const data = await response.json();
                console.log('Datos recibidos de la parroquia:', data); // Para depuración
                return data;
            } catch (error) {
                console.error("Error al obtener detalles:", error);
                return null;
            }
        }

        function formatearHorariosPorDia(horarios) {
            if (!horarios || horarios.length === 0) {
                return '<div class="no-horarios">📭 No hay horarios registrados para esta parroquia</div>';
            }

            const nombresDias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            
            // Agrupar horarios por día de la semana
            const horariosPorDia = {};
            horarios.forEach(horario => {
                const dia = horario.dia_semana;
                if (!horariosPorDia[dia]) {
                    horariosPorDia[dia] = [];
                }
                horariosPorDia[dia].push(horario.hora);
            });

            // Ordenar las horas de cada día
            Object.keys(horariosPorDia).forEach(dia => {
                horariosPorDia[dia].sort((a, b) => {
                    const [h1, m1] = a.split(':').map(Number);
                    const [h2, m2] = b.split(':').map(Number);
                    if (h1 !== h2) return h1 - h2;
                    return m1 - m2;
                });
            });

            // Ordenar los días de la semana (0 a 6)
            const diasOrdenados = Object.keys(horariosPorDia).sort((a, b) => a - b);

            // Generar HTML
            let html = '<div class="horarios-semana">';
            html += '<h3>📅 Horarios de Misa por Día</h3>';
            
            for (const dia of diasOrdenados) {
                const horas = horariosPorDia[dia];
                html += `
                    <div class="dia-horario">
                        <div class="dia-nombre">${nombresDias[dia]}</div>
                        <div class="horas-lista">
                            ${horas.map(hora => `<span class="hora-badge">🕰️ ${hora} hs</span>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            return html;
        }

        function mostrarModal(parroquia) {
            const modalBody = document.getElementById('modalBody');
            
            // Los horarios vienen en el campo 'horarios' según tu server.js
            const horarios = parroquia.horarios || [];
            
            console.log(`Mostrando modal para ${parroquia.nombre} con ${horarios.length} horarios`);
            
            // Generar HTML de horarios formateados
            const horariosHTML = formatearHorariosPorDia(horarios);
            
            modalBody.innerHTML = `
                <div class="info-parroquia">
                    <h2 style="color: #667eea; margin-bottom: 15px;">${escapeHtml(parroquia.nombre)}</h2>
                    <p><strong>📍 Dirección:</strong> ${escapeHtml(parroquia.direccion || 'No especificada')}</p>
                    <p><strong>📞 Teléfono:</strong> ${escapeHtml(parroquia.telefono || 'No especificado')}</p>
                    <p><strong>🆔 ID:</strong> ${parroquia.id}</p>
                </div>
                ${horariosHTML}
            `;

            document.getElementById('modal').style.display = 'block';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function mostrarFecha() {
            const hoy = new Date();
            const dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            const diaSemana = dias[hoy.getDay()];
            const fecha = `${hoy.getDate()} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;
            
            document.getElementById('diaSemana').textContent = diaSemana;
            document.getElementById('fechaCompleta').textContent = fecha;
        }

        async function renderizarHorarios() {
            const container = document.getElementById('horariosContainer');
            
            try {
                mostrarFecha();
                const data = await cargarHorarios();
                
                if (!data.horarios || data.horarios.length === 0) {
                    container.innerHTML = `
                        <div class="error">
                            🕊️ No hay misas programadas para el día de hoy
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                for (const horario of data.horarios) {
                    html += `
                        <div class="hora-card">
                            <div class="hora-header">
                                <span class="hora-titulo">🕰️ ${horario.hora} hs</span>
                                <span class="cantidad">${horario.parroquias.length} parroquia${horario.parroquias.length !== 1 ? 's' : ''}</span>
                            </div>
                            <div class="parroquias-lista">
                    `;
                    
                    for (let i = 0; i < horario.parroquias.length; i++) {
                        html += `
                            <div class="parroquia-item" data-id="${horario.parroquias_ids[i]}">
                                ${escapeHtml(horario.parroquias[i])}
                            </div>
                        `;
                    }
                    
                    html += `</div></div>`;
                }
                
                container.innerHTML = html;
                
                // Agregar event listeners a cada parroquia
                document.querySelectorAll('.parroquia-item').forEach(item => {
                    item.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = item.getAttribute('data-id');
                        console.log('Clicked parroquia ID:', id);
                        const parroquia = await obtenerParroquiaConHorarios(id);
                        if (parroquia) {
                            mostrarModal(parroquia);
                        } else {
                            console.error('No se pudo obtener la parroquia');
                            mostrarAlerta('Error al cargar los detalles de la parroquia', 'error');
                        }
                    });
                });
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `
                    <div class="error">
                        ❌ Error al cargar los horarios<br>
                        <small>${error.message}</small>
                    </div>
                `;
            }
        }

        function mostrarAlerta(mensaje, tipo) {
            // Crear alerta temporal
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${tipo}`;
            alertDiv.textContent = mensaje;
            alertDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px;
                border-radius: 10px;
                z-index: 1001;
                background: ${tipo === 'error' ? '#fed7d7' : '#c6f6d5'};
                color: ${tipo === 'error' ? '#742a2a' : '#22543d'};
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        // Configurar el cierre del modal
        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Inicializar
        renderizarHorarios();
        
        // Configurar eventos del modal
        const modal = document.getElementById('modal');
        const closeBtn = document.querySelector('.close');
        
        closeBtn.onclick = function() {
            cerrarModal();
        };
        
        window.onclick = function(event) {
            if (event.target === modal) {
                cerrarModal();
            }
        };
        
        // Actualizar cada hora (3600000 ms = 1 hora)
        setInterval(renderizarHorarios, 3600000);
    </script>
</body>
</html>
